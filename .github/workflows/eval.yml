name: Eval Gate

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  # Detect which files changed so we can skip heavy eval on doc-only PRs
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**.py'
              - 'eval/**'
              - 'actions/**'
              - 'agents/**'
              - '**.yaml'
              - '**.yml'

  eval:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install pyyaml pytest anthropic httpx keyring apscheduler fastapi python-telegram-bot

      - name: Syntax check — all Python files
        run: |
          python -c "
          import ast, pathlib, sys
          errors = []
          for f in pathlib.Path('.').rglob('*.py'):
              if '.venv' in str(f) or '__pycache__' in str(f):
                  continue
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print(f'All {len(list(pathlib.Path(\".\").rglob(\"*.py\")))} Python files parse OK')
          "

      - name: Validate golden.yaml
        run: |
          python -c "
          import yaml
          data = yaml.safe_load(open('eval/fixtures/golden.yaml'))
          total = sum(len(v) for v in data.values())
          print(f'Golden cases: {total} across {len(data)} categories')
          assert total > 400, f'Expected >400 golden cases, got {total}'
          "

      - name: Critical module imports
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          for mod in ['intent', 'verification', 'task_manager', 'context', 'tool_catalog']:
              __import__(mod)
          print('All critical modules import OK')
          "

      - name: Unit tests + pipeline tests + behavioral contracts
        run: |
          python -m pytest tests/test_agent_orchestration.py tests/test_agent_pipeline.py tests/test_behavioral_contracts.py -v --tb=short

      - name: Tool-use eval (swarm gate + schema + param + filter + bypass)
        run: |
          python eval/tool_use_eval.py

      - name: Reasoning eval (strategy selection + identity + anti-patterns)
        run: |
          python eval/reasoning_eval.py

      - name: Post eval summary as PR comment
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const body = `### Eval Gate Results
            - ✅ Syntax check passed
            - ✅ Golden YAML valid
            - ✅ Critical module imports OK
            - ✅ Unit + pipeline + contract tests passed
            - ✅ Tool-use eval passed
            - ✅ Reasoning eval passed

            > Full frozen eval (851 cases) requires local Ollama — run manually before merge:
            > \`python -m eval --cases eval/fixtures/cases.json --parallel\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # Required status check — always runs, gates on whichever path was taken.
  # Point branch protection at this job name instead of "eval".
  syntax-and-tests:
    needs: [changes, eval]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          if [ "${{ needs.changes.outputs.code }}" != "true" ]; then
            echo "No code changes — eval skipped, gate passes"
            exit 0
          fi
          if [ "${{ needs.eval.result }}" = "success" ]; then
            echo "Eval passed"
            exit 0
          fi
          echo "Eval failed or was cancelled"
          exit 1
